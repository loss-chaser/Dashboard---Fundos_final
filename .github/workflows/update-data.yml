name: Atualizar dados diariamente

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar build_data.py
        run: python build_data.py

      - name: Verificar se houve mudanças
        id: check
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commitar e pushar parquets atualizados (GitHub)
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/data_novo
          cp -r data/* /tmp/data_novo/

          git fetch origin main
          git reset --hard origin/main

          cp -r /tmp/data_novo/* data/

          git add data/
          git commit -m "chore: atualização automática de dados [skip ci]" || {
            echo "Nada novo pra commitar."
            exit 0
          }
          git push origin main

      - name: Sincronizar com Hugging Face Space
        if: steps.check.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Adiciona o remote do HF com autenticação
          git remote add hf https://loss-chaser:${HF_TOKEN}@huggingface.co/spaces/loss-chaser/dashboard-fundos
          
          # Pusha pro HF (force pra resolver qualquer divergência histórica entre os repos)
          git push hf main --force
          
          echo "✓ Hugging Face Space atualizado"
